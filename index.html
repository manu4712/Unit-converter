<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
</head>

<body>
    <div id="main">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="number" id="inp">
        <button id="convert-btn">Convert</button>
    </div>
    <div id="result">
        <div class="metrics">
            <h2 class="metrics-heading">Length (Meter/Feet)</h2>
            <p class="metrics-paragraph" id="len-metric">0 meters = 0 feet | 0 feet = 0 meters</p>
        </div>
        <div class="metrics">
            <h2 class="metrics-heading">Volume (Liters/Gallons)</h2>
            <p class="metrics-paragraph" id="vol-metric">0 liters = 0 gallons | 0 gallons = 0 liters</p>
        </div>
        <div class="metrics">
            <h2 class="metrics-heading">Mass (Kilograms/Pounds)</h2>
            <p class="metrics-paragraph" id="mass-metric">0 kilos = 0 pounds | 0 pounds = 0 kilos</p>
        </div>
    </div>
</body>

</html>
